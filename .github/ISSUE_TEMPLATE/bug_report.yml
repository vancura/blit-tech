name: Bug Report
description: Report a bug in blit-tech
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a game with ...
        2. Call BT.drawSprite(...)
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: blit-tech version (from package.json).
      placeholder: '0.2.0'
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Browser and version.
      placeholder: 'Chrome 130'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or error messages.
